name: Formatting

# Fork-supported platform is RHEL/CentOS 10+ (memory:
# project_supported_platforms.md).  Stream 10 ships clang-tools-extra
# at LLVM 22.x natively, so the gate uses dnf instead of pinning
# apt.llvm.org -- same approach as ~/cayuga/.github/workflows/format.yml.

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:
    branches:
      - '**'

jobs:
  clang-format:
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream10
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        shell: bash
        run: |
          dnf install -y clang-tools-extra git findutils
          clang-format --version

      - name: Check formatting
        shell: bash
        run: |
          mapfile -d '' files < <(find ql test-suite Examples fuzz-test-suite \
              -type f \( -name '*.hpp' -o -name '*.cpp' \) -print0)
          clang-format --dry-run -Werror "${files[@]}"
