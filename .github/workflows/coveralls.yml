name: Coverage report

# Fork-supported platform is RHEL/CentOS 10+ (memory:
# project_supported_platforms.md).  Runs inside CentOS Stream 10 with
# gcc-toolset-15; lcov from EPEL.

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream10
    env:
      PATH: /opt/rh/gcc-toolset-15/root/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rh/gcc-toolset-15/root/usr/lib64
      CC: /opt/rh/gcc-toolset-15/root/usr/bin/gcc
      CXX: /opt/rh/gcc-toolset-15/root/usr/bin/g++
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools (dnf)
        shell: bash
        run: |
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled crb
          dnf install -y \
            gcc-toolset-15 gcc-toolset-15-libatomic-devel \
            autoconf automake libtool make \
            boost-devel \
            nlohmann-json-devel \
            lcov \
            git which

      - name: Compile
        shell: bash
        run: |
          ./autogen.sh
          ./configure --disable-shared CXXFLAGS='-O1 -fprofile-arcs -ftest-coverage' LDFLAGS='-lgcov'
          make -j"$(nproc)"

      - name: Capture baseline
        shell: bash
        run: |
          mkdir -p coverage tmp
          lcov --no-external --capture --initial --ignore-errors mismatch --directory . --output-file ./tmp/lcov_base.info

      - name: Run tests
        shell: bash
        run: |
          ./test-suite/quantlib-test-suite --log_level=message

      - name: Run examples
        shell: bash
        run: |
          make -C Examples check-examples

      - name: Capture coverage
        shell: bash
        run: |
          lcov --no-external --capture --ignore-errors mismatch --directory . --output-file ./tmp/lcov_run.info
          lcov --add-tracefile ./tmp/lcov_base.info --add-tracefile ./tmp/lcov_run.info --output-file ./tmp/lcov_total.info
          lcov --remove ./tmp/lcov_total.info "$PWD/Examples/*" "$PWD/test-suite/*" --output-file ./coverage/lcov.info

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./coverage/lcov.info
