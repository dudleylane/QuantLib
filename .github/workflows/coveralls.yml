name: Coverage report
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
jobs:
  coverage:
    runs-on: ubuntu-latest
    # ubuntu-22.04 ships GCC 11/12 -- below the fork's C++23 / GCC >= 15.2.1
    # floor (CLAUDE.md, acinclude.m4).  Use the lballabio devenv image which
    # already provides a recent compiler, and add lcov + nlohmann-json on top.
    container: ghcr.io/lballabio/quantlib-devenv:rolling
    steps:
    - uses: actions/checkout@v6
    - name: Setup
      run: |
        apt-get update
        apt-get install -y lcov nlohmann-json3-dev
    - name: Compile
      run: |
        ./autogen.sh
        ./configure --disable-shared CXXFLAGS='-O1 -fprofile-arcs -ftest-coverage' LDFLAGS='-lgcov'
        make -j 4
    - name: Capture baseline
      run: |
        mkdir -p coverage tmp
        lcov --no-external --capture --initial --directory . --output-file ./tmp/lcov_base.info
    - name: Run tests
      run: |
        ./test-suite/quantlib-test-suite --log_level=message
    - name: Run examples
      run: |
        make -C Examples check-examples
    - name: Capture coverage
      run: |
        lcov --no-external --capture --directory . --output-file ./tmp/lcov_run.info
        lcov --add-tracefile ./tmp/lcov_base.info --add-tracefile ./tmp/lcov_run.info --output-file ./tmp/lcov_total.info
        lcov --remove ./tmp/lcov_total.info "$PWD/Examples/*" "$PWD/test-suite/*" --output-file ./coverage/lcov.info
    - name: Upload coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: ./coverage/lcov.info
