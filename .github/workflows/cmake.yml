name: CMake build

# Fork-supported platform is RHEL/CentOS 10+ (memory:
# project_supported_platforms.md).  Windows + macOS cells removed
# along with macos.yml / msvc*.yml / cmake-latest-runners.yml -- the
# fork doesn't claim those targets.

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  cmake-linux:
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream10
    env:
      PATH: /opt/rh/gcc-toolset-15/root/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rh/gcc-toolset-15/root/usr/lib64
      CC: /opt/rh/gcc-toolset-15/root/usr/bin/gcc
      CXX: /opt/rh/gcc-toolset-15/root/usr/bin/g++
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools (dnf)
        shell: bash
        run: |
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled crb
          dnf install -y \
            gcc-toolset-15 gcc-toolset-15-libatomic-devel \
            cmake ninja-build pkgconfig \
            boost-devel \
            nlohmann-json-devel \
            ccache \
            git which

      - name: Cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: cmake-linux-ci-build-${{ github.ref }}
          restore-keys: |
            cmake-linux-ci-build-${{ github.ref }}
            cmake-linux-ci-build-refs/heads/master
            cmake-linux-ci-build-

      - name: Compile
        shell: bash
        run: |
          mkdir build
          cd build
          cmake .. -GNinja -DBOOST_ROOT=/usr -DCMAKE_BUILD_TYPE=Release \
            -DQL_COMPILE_WARNING_AS_ERROR=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -L
          cat ql/config.hpp
          cmake --build . --verbose
          cmake --install .
          # Refresh dynamic linker cache so the test binary can find
          # libQuantLib.so.1 in /usr/local/lib.  Container runs as root.
          echo "/usr/local/lib" > /etc/ld.so.conf.d/quantlib.conf
          ldconfig

      - name: Test
        shell: bash
        run: |
          quantlib-test-suite --log_level=message

      - name: Run benchmark
        shell: bash
        run: |
          quantlib-benchmark --size=1

  cmake-linux-with-options:
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream10
    env:
      PATH: /opt/rh/gcc-toolset-15/root/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rh/gcc-toolset-15/root/usr/lib64
      CC: /opt/rh/gcc-toolset-15/root/usr/bin/gcc
      CXX: /opt/rh/gcc-toolset-15/root/usr/bin/g++
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools (dnf)
        shell: bash
        run: |
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled crb
          dnf install -y \
            gcc-toolset-15 gcc-toolset-15-libatomic-devel \
            cmake ninja-build pkgconfig \
            boost-devel \
            nlohmann-json-devel \
            ccache \
            git which

      - name: Cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: cmake-linux-ci-opts-${{ github.ref }}
          restore-keys: |
            cmake-linux-ci-opts-${{ github.ref }}
            cmake-linux-ci-opts-refs/heads/master
            cmake-linux-ci-opts-

      - name: Compile
        shell: bash
        run: |
          cmake --preset linux-ci-build-with-nonstandard-options -L
          cd build/linux-ci-build-with-nonstandard-options
          cat ql/config.hpp
          cmake --build . --verbose
          cmake --build . --target install
          echo "/usr/local/lib" > /etc/ld.so.conf.d/quantlib.conf
          ldconfig

      - name: Test
        shell: bash
        run: |
          quantlib-test-suite --log_level=message
