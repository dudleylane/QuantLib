name: Sync quantlib organization repository
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync-org-repo:
    # Upstream-only -- the fork doesn't mirror to the quantlib org.
    if: ${{ github.repository == 'lballabio/QuantLib' && github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        repository: quantlib/QuantLib
        token: ${{ secrets.ORG_PUSH_PAT }}
        ref: master
        path: quantlib
    - name: Setup second remote
      run: |
        cd quantlib
        git remote add src https://github.com/lballabio/QuantLib.git
        git fetch src
    - name: Push new commits
      env:
        GITHUB_TOKEN: ${{ secrets.ORG_PUSH_PAT }}
      run: |
        cd quantlib
        git push origin ${{ github.ref_name }}
        git merge --ff-only ${{ github.ref_name }}
        git push origin master

