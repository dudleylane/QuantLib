name: Linux build

# Fork-supported platform is RHEL/CentOS 10+ (memory:
# project_supported_platforms.md).  Builds run inside the public
# CentOS Stream 10 container; gcc-toolset-15 is activated via env
# vars so every step picks up GCC 15 without a per-step `scl enable`
# wrapper (matches the pattern in ~/cayuga/.github/workflows).
#
# The matrix exercises QuantLib's QL_*-driven config space.  Each
# cell flips one configureflags / cxxflags axis; the default cell
# (no flags) covers the baseline c++23 build.

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream10
    # gcc-toolset-15 path/lib activation.  CentOS Stream 10 ships with
    # GCC 14 by default; the fork floor is GCC >= 15.2.1 (CLAUDE.md).
    env:
      PATH: /opt/rh/gcc-toolset-15/root/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rh/gcc-toolset-15/root/usr/lib64
      CC: /opt/rh/gcc-toolset-15/root/usr/bin/gcc
      CXX: /opt/rh/gcc-toolset-15/root/usr/bin/g++
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Default (c++23, no extra flags)"
            shortname: default
            tests: true
          - name: "C++26 mode"
            shortname: c++26
            cxxflags: "-std=c++26"
          - name: "Unity build enabled"
            shortname: unity
            configureflags: --enable-unity-build
          - name: "Intraday calculations enabled"
            shortname: intraday
            configureflags: --enable-intraday
            tests: true
          - name: "Throwing in cycles enabled"
            shortname: cycles
            configureflags: --enable-throwing-in-cycles --disable-faster-lazy-objects
            tests: true
          - name: "Indexed coupons enabled"
            shortname: indexed
            configureflags: --enable-indexed-coupons
            tests: true
          - name: "Standard Library classes enabled"
            shortname: stdclasses
            configureflags: --enable-std-classes
            tests: true
          - name: "Thread-safe observer enabled"
            shortname: threadsafe
            configureflags: --enable-thread-safe-observer-pattern
            tests: true
          - name: "Sessions enabled"
            shortname: sessions
            configureflags: --enable-sessions
            tests: true
          - name: "OpenMP enabled"
            shortname: openmp
            configureflags: --enable-openmp
            tests: true
          - name: "Parallel unit-test runner"
            shortname: paralleltests
            configureflags: --enable-parallel-unit-test-runner
            tests: true
          - name: "Null as function template"
            shortname: nullfunctions
            configureflags: --enable-null-as-functions
            tests: true
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools (dnf)
        # CRB enables -devel packages held back from base; EPEL ships
        # ccache.  nlohmann-json-devel is required for the fork's
        # default-ON QL_ENABLE_JSON_MARKETDATA.
        shell: bash
        run: |
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled crb
          dnf install -y \
            gcc-toolset-15 gcc-toolset-15-libatomic-devel \
            autoconf automake libtool make \
            boost-devel \
            nlohmann-json-devel \
            ccache \
            git which

      - name: Cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-ci-build-${{ matrix.shortname }}-${{ github.ref }}
          restore-keys: |
            linux-ci-build-${{ matrix.shortname }}-${{ github.ref }}
            linux-ci-build-${{ matrix.shortname }}-refs/heads/master
            linux-ci-build-${{ matrix.shortname }}-

      - name: Compiler version
        shell: bash
        run: |
          gcc --version

      - name: Build
        shell: bash
        run: |
          ./autogen.sh
          ./configure --disable-static ${{ matrix.configureflags }} \
            CC="ccache gcc" CXX="ccache g++" \
            CXXFLAGS="-O2 -g0 -Wall -Wno-unknown-pragmas -Werror ${{ matrix.cxxflags }}"
          cat ql/config.hpp
          make -j"$(nproc)"

      - name: Run tests
        if: ${{ matrix.tests }}
        shell: bash
        run: |
          ./test-suite/quantlib-test-suite --log_level=message

      - name: Run examples
        if: ${{ matrix.tests }}
        shell: bash
        run: |
          make check-examples

      - name: Check global header
        if: ${{ matrix.tests }}
        shell: bash
        run: |
          echo "#include <ql/quantlib.hpp>" > test1.cpp
          echo "int main() { return 0; }" >> test1.cpp
          echo "#include <ql/quantlib.hpp>" > test2.cpp
          make install
          g++ -O2 -g0 -Wall -Wno-unknown-pragmas -Werror ${{ matrix.cxxflags }} \
            $(quantlib-config --cflags) test1.cpp test2.cpp $(quantlib-config --libs)
